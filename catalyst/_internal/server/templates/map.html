<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalyst Map Runtime</title>
  <link href="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>
  <style>
    html, body { margin: 0; height: 100%; }
    #map { position: absolute; inset: 0; }
    #legend {
      position: absolute; left: 12px; bottom: 12px; z-index: 5;
      background: rgba(17, 24, 39, 0.86); color: #f9fafb;
      font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      border-radius: 8px; padding: 8px 10px; max-width: 280px;
      max-height: 46vh; overflow-y: auto;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35); display: none;
    }
    #legend h4 { margin: 0 0 6px; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; opacity: .8; }
    #legend .row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
    #legend .sw { width: 14px; height: 14px; border-radius: 3px; flex: 0 0 auto; border: 1px solid rgba(255,255,255,.25); }
    #legend .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 230px; }
    #legend .sub { opacity: .65; font-size: 11px; }
    #legend .sec { margin-top: 8px; }
    #legend .sec:first-of-type { margin-top: 0; }
    #legend .ds { font-weight: 600; margin: 0 0 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #legend .bar { height: 10px; border-radius: 3px; margin: 4px 0 2px; border: 1px solid rgba(255,255,255,.25); }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="legend"></div>
<script>
"use strict";
// Path prefix this runtime is mounted under ("/catalyst" on the public site, ""
// on the dev box). Derived from the served URL so tile/dataset fetches resolve
// behind a reverse proxy.
const CATALYST_BASE = window.location.pathname.replace(/\/map\.html?$/i, "");
/*
 * Catalyst map runtime (loaded inside a sandboxed <iframe sandbox="allow-scripts">).
 *
 * Two responsibilities:
 *   1. Render one OR MORE catalyst datasets as stacked, independently-styled
 *      MapLibre layers (the cross-dataset overlay that distinguishes Catalyst).
 *   2. Provide a small, allow-listed `api` surface to LLM-generated scripts and
 *      execute them in a constrained wrapper (no DOM / network / storage access).
 *
 * Because the hosting iframe is sandboxed WITHOUT allow-same-origin, this
 * document has an opaque ("null") origin. We therefore (a) target postMessage
 * with "*" and (b) authenticate the peer by window identity (event.source ===
 * window.parent) rather than by origin string.
 */

// ----------------------------------------------------------------------------
// Peer messaging (parent <-> runtime)
// ----------------------------------------------------------------------------
// Bumped whenever the `api` surface offered to generated scripts changes. The
// parent checks this in the ready/pong handshake and force-reloads a stale
// runtime (a long-lived tab otherwise keeps executing an old iframe where new
// api.* calls throw and every generated script dies).
const RUNTIME_API_LEVEL = 2;
function postToParent(type, payload) {
  try { window.parent.postMessage({ type, payload: payload || {} }, "*"); } catch (e) {}
}
function logToParent(message) { postToParent("starlet:runtime-log", { message: String(message) }); }
function errorToParent(message) { postToParent("starlet:runtime-error", { message: String(message) }); }

// ----------------------------------------------------------------------------
// Map setup (basemap only; dataset layers are added on demand)
// ----------------------------------------------------------------------------
const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      basemap: { type: "raster", tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"], tileSize: 256, attribution: "© OpenStreetMap" }
    },
    layers: [{ id: "basemap", type: "raster", source: "basemap" }]
  },
  center: [0, 20],
  zoom: 1.4
});
map.addControl(new maplibregl.NavigationControl(), "top-right");

// dataset -> { style, opacity, label, bbox, geometryKind }
const layers = new Map();
let activeDataset = "";
let mapLoaded = false;

// Interactivity primitives (trusted host code). Generated scripts reach these
// only through `api.*`, so the sandboxed script never itself contains the
// forbidden tokens (requestAnimationFrame / DOM / Popup live HERE, not there).
// Every handle is tracked so it can be torn down on reset or before the next
// generated script runs (no leaked animation loops or duplicate hover handlers).
const _interactive = { rafs: new Set(), hovers: [], popups: new Set(), pulseLayers: new Set() };

// ----------------------------------------------------------------------------
// Helpers
// ----------------------------------------------------------------------------
function sourceId(dataset) { return "src__" + dataset.replace(/[^a-zA-Z0-9_]/g, "_"); }
function layerId(dataset, kind) { return "lyr__" + dataset.replace(/[^a-zA-Z0-9_]/g, "_") + "__" + kind; }
// Per-layer tile-URL overrides (e.g. lazy cross-dataset derive layers).
const tileUrlOverrides = {};
function tileUrl(dataset) {
  if (tileUrlOverrides[dataset]) return tileUrlOverrides[dataset];
  // On-the-fly tiling route: /<dataset>/{z}/{x}/{y}.mvt
  return window.location.origin + CATALYST_BASE + "/" + encodeURIComponent(dataset) + "/{z}/{x}/{y}.mvt";
}
function deriveLiveUrl(d) {
  // Lazy derive route: /api/derive-live/<target>/<source>/<value_attr>/{z}/{x}/{y}.mvt
  return window.location.origin + CATALYST_BASE + "/api/derive-live/"
    + encodeURIComponent(d.target) + "/" + encodeURIComponent(d.source) + "/"
    + encodeURIComponent(d.value_attribute) + "/{z}/{x}/{y}.mvt";
}

function colorExpression(renderer) {
  if (!renderer) return "#4682B4";
  if (renderer.mode === "single") return renderer.color || "#4682B4";

  if (renderer.mode === "categorical") {
    const attr = renderer.attribute;
    const fallback = renderer.fallback_color || "#4682B4";
    const stops = Array.isArray(renderer.stops) ? renderer.stops : [];
    if (!attr || stops.length === 0) return fallback;
    const expr = ["match", ["to-string", ["get", attr]]];
    for (const s of stops) {
      if (s && s.value != null && s.color) { expr.push(String(s.value), s.color); }
    }
    if (expr.length < 4) return fallback; // MapLibre "match" needs >=1 label/output pair
    expr.push(fallback);
    return expr;
  }

  if (renderer.mode === "gradient") {
    const attr = renderer.attribute;
    const colors = (Array.isArray(renderer.colors) && renderer.colors.length) ? renderer.colors : ["#f7fbff", "#08306b"];
    let min = Number(renderer.min), max = Number(renderer.max);
    if (!isFinite(min)) min = 0;
    if (!isFinite(max) || max <= min) max = min + 1;
    if (!attr) return colors[colors.length - 1];
    const expr = ["interpolate", ["linear"], ["to-number", ["get", attr], min]];
    const n = colors.length;
    for (let i = 0; i < n; i++) {
      const t = min + (max - min) * (n === 1 ? 0 : i / (n - 1));
      expr.push(t, colors[i]);
    }
    return expr;
  }
  return "#4682B4";
}

function defaultStyleFor(kind) {
  const base = kind === "line" ? "line-single-color" : kind === "point" ? "circle-single-color" : "fill-single-color";
  return {
    style_type: base, geometry_kind: kind || "unknown",
    opacity: 0.85, stroke_width: 1.5, radius: 4,
    renderer: { mode: "single", color: "#4f83ff" },
    legend_title: ""
  };
}

function paintFor(style) {
  const renderer = style.renderer || {};
  const color = colorExpression(renderer);
  const opacity = Number.isFinite(+style.opacity) ? +style.opacity : 0.85;
  const strokeWidth = Number.isFinite(+style.stroke_width) ? +style.stroke_width : 1.5;
  const radius = Number.isFinite(+style.radius) ? +style.radius : 4;
  return {
    fill: { "fill-color": color, "fill-opacity": Math.min(opacity, 0.85), "fill-outline-color": "rgba(0,0,0,0.25)" },
    line: { "line-color": color, "line-width": strokeWidth, "line-opacity": Math.min(opacity + 0.1, 1) },
    circle: { "circle-color": color, "circle-radius": radius, "circle-opacity": opacity, "circle-stroke-color": "#ffffff", "circle-stroke-width": 0.6 }
  };
}

function ensureLayer(dataset, style) {
  if (!dataset) return;
  const sid = sourceId(dataset);
  if (!map.getSource(sid)) {
    map.addSource(sid, { type: "vector", tiles: [tileUrl(dataset)], minzoom: 0, maxzoom: 14 });
  }
  const paint = paintFor(style || defaultStyleFor("unknown"));
  const specs = [
    { kind: "fill", type: "fill", filter: ["==", "$type", "Polygon"], paint: paint.fill },
    { kind: "line", type: "line", filter: ["in", "$type", "LineString", "Polygon"], paint: paint.line },
    { kind: "circle", type: "circle", filter: ["==", "$type", "Point"], paint: paint.circle }
  ];
  for (const s of specs) {
    const lid = layerId(dataset, s.kind);
    if (!map.getLayer(lid)) {
      map.addLayer({ id: lid, type: s.type, source: sid, "source-layer": "layer0", filter: s.filter, paint: s.paint });
    } else {
      for (const [k, v] of Object.entries(s.paint)) { map.setPaintProperty(lid, k, v); }
    }
  }
}

// Which render kind (fill/line/circle) actually represents a dataset's geometry,
// used to pick the layer to pulse/hover. Derived from the style_type prefix.
function kindFromStyle(style) {
  const p = String((style && style.style_type) || "").split("-")[0];
  if (p === "line" || p === "circle" || p === "fill") return p;
  const g = String((style && style.geometry_kind) || "").toLowerCase();
  if (g.includes("line")) return "line";
  if (g.includes("point")) return "circle";
  return "fill";
}

function applyStyleToDataset(dataset, style) {
  if (!dataset) return;
  ensureLayer(dataset, style);
  const entry = layers.get(dataset) || {};
  entry.style = style;
  entry.kind = kindFromStyle(style);
  entry.label = (style && (style.legend_title || style.target_attribute)) || dataset;
  layers.set(dataset, entry);
  renderLegend();
}

function removeDataset(dataset) {
  pruneInteractivity(dataset);
  for (const kind of ["fill", "line", "circle"]) {
    const lid = layerId(dataset, kind);
    if (map.getLayer(lid)) map.removeLayer(lid);
  }
  const sid = sourceId(dataset);
  if (map.getSource(sid)) { try { map.removeSource(sid); } catch (e) {} }
  layers.delete(dataset);
}

function removeAll() {
  clearInteractivity();
  for (const dataset of Array.from(layers.keys())) removeDataset(dataset);
  activeDataset = "";
  renderLegend();
}

const _bboxCache = new Map();
async function datasetBBox(dataset) {
  if (_bboxCache.has(dataset)) return _bboxCache.get(dataset);
  try {
    const resp = await fetch(window.location.origin + CATALYST_BASE + "/datasets/" + encodeURIComponent(dataset) + ".json");
    const meta = await resp.json();
    const bbox = Array.isArray(meta.bbox) && meta.bbox.length === 4 ? meta.bbox : null;
    _bboxCache.set(dataset, bbox);
    return bbox;
  } catch (e) { return null; }
}

async function fitToDatasets(datasets) {
  const boxes = [];
  for (const d of datasets) { const b = await datasetBBox(d); if (b) boxes.push(b); }
  if (!boxes.length) return;
  let [minx, miny, maxx, maxy] = boxes[0];
  for (const b of boxes) { minx = Math.min(minx, b[0]); miny = Math.min(miny, b[1]); maxx = Math.max(maxx, b[2]); maxy = Math.max(maxy, b[3]); }
  if ([minx, miny, maxx, maxy].some(v => !isFinite(v))) return;
  try { map.fitBounds([[minx, miny], [maxx, maxy]], { padding: 40, duration: 600, maxZoom: 12 }); } catch (e) {}
}

function escHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
function legendSwatch(color) {
  return `<span class="sw" style="background:${escHtml(color || "#4f83ff")}"></span>`;
}
function fmtNum(v) {
  if (typeof v !== "number" || !isFinite(v)) return v == null ? "" : v;
  if (Number.isInteger(v)) return Math.abs(v) >= 1000 ? v.toLocaleString() : String(v);
  return Math.abs(v) >= 1000 ? Math.round(v).toLocaleString() : v.toFixed(2);
}

function renderLegend() {
  const el = document.getElementById("legend");
  if (!layers.size) { el.style.display = "none"; el.innerHTML = ""; return; }
  const multi = layers.size > 1;
  const MAX_CATS = 16;
  const sections = Array.from(layers.entries()).map(([dataset, entry]) => {
    const style = entry.style || {};
    const renderer = style.renderer || {};
    const attr = style.target_attribute || renderer.attribute || "";
    const head = multi
      ? `<div class="ds">${escHtml(dataset)}${attr ? `<span class="sub"> · ${escHtml(attr)}</span>` : ""}</div>`
      : "";
    let body = "";
    if (renderer.mode === "categorical" && Array.isArray(renderer.stops) && renderer.stops.length) {
      const shown = renderer.stops.slice(0, MAX_CATS);
      body = shown.map(s =>
        `<div class="row">${legendSwatch(s.color)}<span class="nm">${escHtml(s.value)}</span></div>`
      ).join("");
      if (renderer.stops.length > MAX_CATS) {
        body += `<div class="row sub" style="padding-left:22px;">+${renderer.stops.length - MAX_CATS} more…</div>`;
      }
      if (renderer.fallback_color) {
        body += `<div class="row">${legendSwatch(renderer.fallback_color)}<span class="nm sub">Other / no value</span></div>`;
      }
    } else if (renderer.mode === "gradient") {
      const colors = (renderer.colors && renderer.colors.length) ? renderer.colors : ["#4f83ff", "#f9fafb"];
      body =
        `<div class="bar" style="background:linear-gradient(to right, ${colors.map(escHtml).join(", ")})"></div>` +
        `<div class="row sub" style="justify-content:space-between;gap:0;">` +
          `<span>${escHtml(fmtNum(renderer.min))}</span><span>${escHtml(fmtNum(renderer.max))}</span></div>`;
    } else {
      const color = renderer.color || (renderer.stops && renderer.stops[0] && renderer.stops[0].color) || "#4f83ff";
      const label = multi ? (attr || "value") : dataset;
      body = `<div class="row">${legendSwatch(color)}<span class="nm">${escHtml(label)}</span></div>`;
    }
    return `<div class="sec">${head}${body}</div>`;
  }).join("");
  const first = layers.values().next().value;
  const firstTitle = first && first.style && (first.style.legend_title || first.style.target_attribute);
  const title = multi ? `Overlay · ${layers.size} datasets` : (escHtml(firstTitle) || "Layer");
  el.innerHTML = `<h4>${title}</h4>${sections}`;
  el.style.display = "block";
}

// Replace the whole stack with `specs` = [{dataset, style, opacity?, label?}]
async function setLayers(specs) {
  const wanted = new Set();
  const fitList = [];
  for (const spec of (specs || [])) {
    if (!spec || !spec.dataset) continue;
    // A lazy-derive layer carries a `derive` spec -> custom tile URL.
    if (spec.derive && spec.derive.target) tileUrlOverrides[spec.dataset] = deriveLiveUrl(spec.derive);
    else if (spec.tileUrl) tileUrlOverrides[spec.dataset] = spec.tileUrl;
    else delete tileUrlOverrides[spec.dataset];
    wanted.add(spec.dataset);
    const style = spec.style || defaultStyleFor("unknown");
    if (spec.opacity != null) style.opacity = spec.opacity;
    applyStyleToDataset(spec.dataset, style);
    fitList.push(spec.fitDataset || spec.dataset);
  }
  for (const existing of Array.from(layers.keys())) {
    if (!wanted.has(existing)) removeDataset(existing);
  }
  const list = Array.from(wanted);
  activeDataset = list.length ? list[list.length - 1] : "";
  renderLegend();
  if (fitList.length) await fitToDatasets(fitList);
}

// ----------------------------------------------------------------------------
// Interactivity helpers (trusted). Used by api.pulse / api.hoverPopup / api.paint.
// ----------------------------------------------------------------------------
function clearInteractivity() {
  _interactive.runGen = (_interactive.runGen || 0) + 1;   // invalidates deferred rebinds from the previous run
  for (const c of _interactive.rafs) { c.alive = false; try { cancelAnimationFrame(c.id); } catch (e) {} }
  _interactive.rafs.clear();
  for (const h of _interactive.hovers) { try { map.off(h.event, h.layer, h.fn); } catch (e) {} }
  _interactive.hovers.length = 0;
  for (const p of _interactive.popups) { try { p.remove(); } catch (e) {} }
  _interactive.popups.clear();
  for (const lid of _interactive.pulseLayers) { try { if (map.getLayer(lid)) map.removeLayer(lid); } catch (e) {} }
  _interactive.pulseLayers.clear();
  try { map.getCanvas().style.cursor = ""; } catch (e) {}
}

// Tear down interactivity attached to one dataset (called when its layer is removed).
function pruneInteractivity(dataset) {
  const pulsePre = "pulse__" + dataset.replace(/[^a-zA-Z0-9_]/g, "_") + "__";
  for (const lid of Array.from(_interactive.pulseLayers)) {
    if (lid.indexOf(pulsePre) === 0) {
      try { if (map.getLayer(lid)) map.removeLayer(lid); } catch (e) {}
      _interactive.pulseLayers.delete(lid);
    }
  }
  const dsPrefix = layerId(dataset, "");
  _interactive.hovers = _interactive.hovers.filter(h => {
    if (h.layer.indexOf(dsPrefix) === 0) { try { map.off(h.event, h.layer, h.fn); } catch (e) {} return false; }
    return true;
  });
}

// requestAnimationFrame loop with a lifecycle handle we can cancel.
function startAnim(step) {
  const ctrl = { alive: true, id: 0 };
  const loop = (ts) => { if (!ctrl.alive) return; try { step(ts); } catch (e) {} ctrl.id = requestAnimationFrame(loop); };
  ctrl.id = requestAnimationFrame(loop);
  _interactive.rafs.add(ctrl);
  return ctrl;
}

function datasetKind(dataset) { const e = layers.get(dataset); return (e && e.kind) || "fill"; }
function existingLayerKinds(dataset) { return ["fill", "line", "circle"].filter(k => map.getLayer(layerId(dataset, k))); }

// ----------------------------------------------------------------------------
// API surface exposed to LLM-generated scripts
// ----------------------------------------------------------------------------
const api = {
  setDataset(dataset) {
    if (!dataset) return;
    // Guard an active cross-dataset join: if the joined ("live__<ds>__…") layer is
    // showing, a generated script that calls setDataset(baseDataset) must NOT tear it
    // down (that would drop the joined attribute). Keep the join and stay on it.
    const vpfx = "live__" + String(dataset).replace(/[^a-zA-Z0-9_]/g, "_") + "__";
    if (activeDataset && activeDataset.indexOf(vpfx) === 0) return;
    activeDataset = dataset;
    setLayers([{ dataset, style: layers.get(dataset) ? layers.get(dataset).style : undefined }]);
  },
  applyStyle(style) { const ds = (style && style.dataset) || activeDataset; applyStyleToDataset(ds, style); },
  setLayers(specs) { return setLayers(specs); },
  addLayer(dataset, style) { applyStyleToDataset(dataset, style || defaultStyleFor("unknown")); if (dataset) { activeDataset = dataset; renderLegend(); } },
  ensureDatasetLayer() { if (activeDataset) ensureLayer(activeDataset, layers.get(activeDataset) ? layers.get(activeDataset).style : undefined); },
  fitToDataset(dataset) { return fitToDatasets([dataset || activeDataset].filter(Boolean)); },
  fitToLayers() { return fitToDatasets(Array.from(layers.keys())); },
  layerIds(dataset) { const ds = dataset || activeDataset; return { fill: layerId(ds, "fill"), line: layerId(ds, "line"), circle: layerId(ds, "circle"), source: sourceId(ds), active: ds }; },
  // The loaded features of the active (or given) layer, for client-side computation
  // (quantiles, sums, category lists, ...). Returns features in the currently loaded
  // tiles (near the viewport); may contain a few tile-boundary duplicates.
  features(dataset) {
    const ds = dataset || activeDataset;
    if (!ds) return [];
    const sid = sourceId(ds);
    if (!map.getSource(sid)) return [];
    try { return map.querySourceFeatures(sid, { sourceLayer: "layer0" }); } catch (e) { return []; }
  },
  // Set any MapLibre paint property to a CONSTANT or a DATA-DRIVEN EXPRESSION,
  // e.g. api.paint("fill-opacity", ["match",["get","haz_class"],"Very High",0.95,"High",0.5,0.12]).
  paint(property, value, opts) {
    const o = opts || {};
    const ds = o.dataset || activeDataset;
    if (!ds || !property) return;
    const kinds = o.kind ? [o.kind] : existingLayerKinds(ds);
    for (const k of kinds) {
      const lid = layerId(ds, k);
      if (map.getLayer(lid)) { try { map.setPaintProperty(lid, property, value); } catch (e) { /* prop/kind mismatch */ } }
    }
    // Polygons render as a fill PLUS a separate outline (line) layer. Fading only the
    // fill leaves bright full-opacity outlines that mask the effect, so mirror
    // fill-opacity onto the outline — small/faded polygons then actually recede.
    if (property === "fill-opacity" && !o.kind) {
      const lid = layerId(ds, "line");
      if (map.getLayer(lid)) { try { map.setPaintProperty(lid, "line-opacity", value); } catch (e) {} }
    }
  },
  // Draw a pulsing (breathing) overlay for features matching `filter`, in `color`.
  // opts: {color?, filter?, period?, minOpacity?, maxOpacity?, kind?, dataset?, width?, radius?, minRadius?, maxRadius?}
  pulse(opts) {
    const o = opts || {};
    const ds = o.dataset || activeDataset;
    if (!ds) return null;
    const sid = sourceId(ds);
    if (!map.getSource(sid)) { logToParent("pulse: no source for " + ds); return null; }
    const kind = o.kind || datasetKind(ds);
    const type = kind === "line" ? "line" : kind === "circle" ? "circle" : "fill";
    const period = Number.isFinite(+o.period) ? +o.period : 1200;
    const minOpacity = Number.isFinite(+o.minOpacity) ? +o.minOpacity : 0.2;
    const maxOpacity = Number.isFinite(+o.maxOpacity) ? +o.maxOpacity : 0.9;
    const color = o.color || "#ff2222";
    let n = 0;
    while (map.getLayer("pulse__" + ds.replace(/[^a-zA-Z0-9_]/g, "_") + "__" + n)) n++;
    const lid = "pulse__" + ds.replace(/[^a-zA-Z0-9_]/g, "_") + "__" + n;
    const paint = type === "fill"
      ? { "fill-color": color, "fill-opacity": maxOpacity, "fill-outline-color": color }
      : type === "line"
      ? { "line-color": color, "line-width": Number.isFinite(+o.width) ? +o.width : 3, "line-opacity": maxOpacity }
      : { "circle-color": color, "circle-radius": Number.isFinite(+o.radius) ? +o.radius : 7, "circle-opacity": maxOpacity, "circle-stroke-color": color, "circle-stroke-width": 1 };
    const def = { id: lid, type, source: sid, "source-layer": "layer0", paint };
    if (o.filter) def.filter = o.filter;
    try { map.addLayer(def); } catch (e) { logToParent("pulse: " + (e && e.message)); return null; }
    _interactive.pulseLayers.add(lid);
    const opacityProp = type === "line" ? "line-opacity" : type === "circle" ? "circle-opacity" : "fill-opacity";
    const rmin = Number.isFinite(+o.minRadius) ? +o.minRadius : null;
    const rmax = Number.isFinite(+o.maxRadius) ? +o.maxRadius : null;
    startAnim((ts) => {
      const phase = 0.5 - 0.5 * Math.cos((ts % period) / period * 2 * Math.PI);
      if (!map.getLayer(lid)) return;
      map.setPaintProperty(lid, opacityProp, minOpacity + (maxOpacity - minOpacity) * phase);
      if (type === "circle" && rmin != null && rmax != null) {
        map.setPaintProperty(lid, "circle-radius", rmin + (rmax - rmin) * phase);
      }
    });
    return lid;
  },
  // Show a popup of feature attributes on hover over a dataset's layer(s).
  // opts: {attributes?:[names], title?:name, dataset?, kind?, html?:(props)=>string}
  hoverPopup(opts) {
    const o = opts || {};
    const ds = o.dataset || activeDataset;
    if (!ds) return;
    let kinds = o.kind ? [o.kind] : existingLayerKinds(ds);
    if (!kinds.length) {
      // The dataset's layers are added asynchronously (metadata fetch first), so a
      // script that runs right after a dataset switch can land here. Rebind once
      // the map settles rather than silently never showing a popup.
      logToParent("hoverPopup: layers for " + ds + " not ready yet; will bind when the map is idle");
      const gen = _interactive.runGen || 0;
      map.once("idle", () => {
        if ((_interactive.runGen || 0) !== gen) return;   // a newer run replaced this script
        if (o.kind || existingLayerKinds(ds).length) api.hoverPopup(o);
        else errorToParent("hoverPopup: no layer for " + ds + " (hover popups are not active)");
      });
      return;
    }
    const popup = new maplibregl.Popup({ closeButton: false, closeOnClick: false, maxWidth: "260px" });
    _interactive.popups.add(popup);
    const attrs = Array.isArray(o.attributes) ? o.attributes : null;
    const buildHtml = (props) => {
      props = props || {};
      if (typeof o.html === "function") { try { return String(o.html(props)); } catch (e) { return ""; } }
      const keys = attrs || Object.keys(props);
      const rows = keys.map(k => `<div style="display:flex;gap:10px;justify-content:space-between"><span style="opacity:.65">${escHtml(k)}</span><b>${escHtml(props[k])}</b></div>`).join("");
      const title = (o.title && props[o.title] != null) ? `<div style="font-weight:600;margin-bottom:4px">${escHtml(props[o.title])}</div>` : "";
      return `<div style="font:12px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">${title}${rows}</div>`;
    };
    for (const k of kinds) {
      const lid = layerId(ds, k);
      if (!map.getLayer(lid)) continue;
      const moveFn = (e) => {
        map.getCanvas().style.cursor = "pointer";
        const f = e.features && e.features[0];
        if (f) popup.setLngLat(e.lngLat).setHTML(buildHtml(f.properties)).addTo(map);
      };
      const leaveFn = () => { map.getCanvas().style.cursor = ""; popup.remove(); };
      map.on("mousemove", lid, moveFn);
      map.on("mouseleave", lid, leaveFn);
      _interactive.hovers.push({ event: "mousemove", layer: lid, fn: moveFn });
      _interactive.hovers.push({ event: "mouseleave", layer: lid, fn: leaveFn });
    }
  },
  addLabels(options) { logToParent("addLabels is a no-op in this runtime build: " + JSON.stringify(options || {})); },
  reset() { removeAll(); },
  log(msg) { logToParent(msg); },
  getState() { return { datasets: Array.from(layers.keys()), active: activeDataset }; }
};

// ----------------------------------------------------------------------------
// Constrained execution of LLM-generated code
// ----------------------------------------------------------------------------
// Identifiers that would let a script escape the runtime sandbox or reach the
// network / DOM / storage. Rejected before execution (defense-in-depth on top
// of the iframe sandbox attribute and the limited argument surface).
// Boundaries exclude '-' (not just \w) so legitimate hyphenated CSS/identifiers in
// generated code — padding-top, margin-top, border-top, align-self, top-right — do
// NOT false-positive, while bare or member-access globals (top, window.document,
// self.eval, parent.location, a.constructor) are still blocked.
const FORBIDDEN = /(?<![\w-])(document|window|parent|top|self|globalThis|frames|opener|fetch|XMLHttpRequest|WebSocket|EventSource|importScripts|localStorage|sessionStorage|indexedDB|cookie|navigator|location|eval|Function|setTimeout|setInterval|require|module|process|__proto__|constructor)(?![\w-])/;

function runScript(script) {
  const src = String(script || "");
  if (!src.trim()) { errorToParent("No script to run."); return; }
  const bad = src.match(FORBIDDEN);
  if (bad) {
    errorToParent("Blocked generated code: disallowed token \"" + bad[0] + "\". " +
      "Only the provided api/map/maplibregl surface may be used.");
    return;
  }
  // Tear down interactivity from any previous run so re-running replaces cleanly
  // (no leaked animation loops or duplicate hover handlers).
  clearInteractivity();
  try {
    // Only api, map, maplibregl are in scope. Strict mode prevents implicit globals.
    const fn = new Function("api", "map", "maplibregl", '"use strict";\n' + src);
    fn(api, map, maplibregl);
    logToParent("Generated script executed.");
  } catch (e) {
    errorToParent("Generated script error: " + (e && e.message ? e.message : e));
  }
}

// ----------------------------------------------------------------------------
// Parent -> runtime message handling
// ----------------------------------------------------------------------------
window.addEventListener("message", (event) => {
  if (event.source !== window.parent) return;     // authenticate peer by identity
  const data = event.data || {};
  const type = data.type;
  const payload = data.payload || {};

  switch (type) {
    case "starlet:ping":
      postToParent("starlet:pong", { apiLevel: RUNTIME_API_LEVEL });
      break;
    case "starlet:reset":
      removeAll();
      break;
    case "starlet:set-dataset":
      if (payload.dataset) { activeDataset = payload.dataset; setLayers([{ dataset: payload.dataset, style: layers.get(payload.dataset) ? layers.get(payload.dataset).style : undefined }]); }
      break;
    case "starlet:apply-style":
      applyStyleToDataset(payload.dataset || activeDataset, payload.style);
      break;
    case "starlet:set-layers":
      setLayers(payload.layers || []);
      break;
    case "starlet:run-script":
      if (payload.dataset) activeDataset = payload.dataset;
      runScript(payload.script);
      break;
    default:
      break;
  }
});

map.on("load", () => {
  mapLoaded = true;
  postToParent("starlet:runtime-ready", { apiLevel: RUNTIME_API_LEVEL });
});
</script>
</body>
</html>
